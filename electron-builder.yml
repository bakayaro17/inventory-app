appId: com.elvis.inventory
productName: Inventory
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
  category: public.app-category.productivity
  artifactName: ${productName}-${version}.${ext}
# Auto-update: publish releases to GitHub. Replace owner/repo below.
publish:
  provider: github
  owner: bakayaro17
  repo: inventory-app
